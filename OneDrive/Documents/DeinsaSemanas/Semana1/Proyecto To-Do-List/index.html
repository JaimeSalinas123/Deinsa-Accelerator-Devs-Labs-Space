<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini To-Do List Pro</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        
        /* Contenedor principal con transición suave de colores */
        #contenedor { 
            padding: 20px; 
            border-radius: 8px; 
            transition: background-color 0.4s ease; 
            max-width: 400px;
        }

        /* Clases de estado que inyectaremos con JS */
        .verde { background-color: #d4edda; }    /* 0 a 2 tareas (Tranquilo) */
        .amarillo { background-color: #fff3cd; } /* 3 a 5 tareas (Alerta) */
        .rojo { background-color: #f8d7da; }     /* 6+ tareas (Sobrecarga) */

        ul { list-style-type: none; padding: 0; }
        li { 
            padding: 10px; 
            border-bottom: 1px solid #ccc; 
            display: flex; 
            justify-content: space-between; 
        }
        
        .btn-eliminar { background: red; color: white; border: none; cursor: pointer; border-radius: 4px;}
        .btn-peligro { background: darkred; color: white; border: none; padding: 5px; cursor: pointer;}
    </style>
</head>
<body>
    <!-- El contenedor inicia con la clase verde -->
    <div id="contenedor" class="verde">
        <h2>Mini To-Do List Pro 📝</h2>
        
        <input type="text" id="inputTarea" placeholder="Escribe una tarea...">
        <button id="btnAgregar">Agregar</button>
        <button id="btnEliminarTodo" class="btn-peligro">Eliminar Todo</button>
        
        <p>Total de tareas pendientes: <strong id="contador">0</strong></p>
        
        <ul id="listaTareas"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
